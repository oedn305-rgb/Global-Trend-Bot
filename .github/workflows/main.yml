name: Blogger Bot Auto Publisher

on:
  schedule:
    # سيقوم بالنشر مرتين يومياً (كل 12 ساعة) لضمان القبول في أدسنس
    # المرة الأولى الساعة 9 صباحاً والمرة الثانية الساعة 9 مساءً بتوقيت جرينتش
    - cron: '0 9,21 * * *' 
  workflow_dispatch: # للتشغيل اليدوي في أي وقت

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Blogger Bot
        env:
          # ضروري جداً تمرير مفتاح جمناي هنا عشان الكود يشتغل
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          BLOGGER_EMAIL: ${{ secrets.BLOGGER_EMAIL }}
        run: python bot.py
