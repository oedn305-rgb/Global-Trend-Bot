name: Blogger Auto Publisher

on:
  workflow_dispatch: # يتيح لك تشغيل البوت يدوياً بضغطة زر
  schedule:
    - cron: '0 */6 * * *' # ينشر مقال كل 6 ساعات تلقائياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Bot
        # هنا يتم تمرير الأسرار من الخزنة إلى الكود
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          BLOGGER_EMAIL: ${{ secrets.BLOGGER_EMAIL }}
        run: python bot.py
