name: Blogger Bot Auto Publisher

on:
  schedule:
    - cron: '0 9 * * *' # ينشر تلقائياً كل يوم الساعة 9 صباحاً
  workflow_dispatch: # يتيح لك التشغيل اليدوي بضغطة زر لتجربة البوت الآن

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # إصدار مستقر جداً للذكاء الاصطناعي

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install g4f requests

      - name: Run Blogger Bot
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          BLOGGER_EMAIL: ${{ secrets.BLOGGER_EMAIL }}
        run: python bot.py
